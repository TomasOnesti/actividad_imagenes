<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>
    <header class="conteiner_start">
        <div class="conteiner">
            <h1 class="titulo">Galeria de paisajes</h1>
        </div>
    </header>
    <main>
        <div class="cont">
           <img src="./img/paisaje_uno.png" alt="imagen_1" class="imagen" id="img">
           <img src="./img/paisaje_dos.png" alt="imagen_2" class="imagen" id="img_2">
           <img src="./img/paisaje_tres.png" alt="imagen_3" class="imagen" id="img_3">
           <img src="./img/paisaje_cuatro.png" alt="imagen_4" class="imagen" id="img_4">
           <img src="./img/paisaje_cinco.png" alt="imagen_5" class="imagen" id="img_5">
           <img src="./img/paisaje_seis.png" alt="imagen_6" class="imagen" id="img_6">
           <img src="./img/paisaje_siete.png" alt="imagen_7" class="imagen" id="img_7">
           <img src="./img/paisaje_ocho.png" alt="imagen_8" class="imagen" id="img_8">
           <img src="./img/paisaje_nueve.png" alt="imagen_9" class="imagen" id="img_9">
        </div>  
        <div id="visor" >
            <span class="boton" id="cerrar">✖</span>
            <span class="boton" id="izq">⬅</span>
    
            <img id="imgZoom">
            <span class="boton" id="der">➡</span>
        </div>
    </main>
    <footer class="conteiner_start">
        <div class="conteiner">
            <p class="text">Todos los derechos reservados</p>
        </div>
    </footer>
    <script src="./js/funciones.js"></script>
</body>
</html>
